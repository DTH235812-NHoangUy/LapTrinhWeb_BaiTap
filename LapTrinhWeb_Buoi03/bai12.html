<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bài 12 - Tự động trình chiếu ảnh</title>
    <style>
        .gallery {
            text-align: center;
            margin-top: 50px;
        }
        img[name="myimage"] {
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            width: 400px;
            height: 300px;
            object-fit: cover;
            transition: 0.5s; /* Thêm hiệu ứng chuyển mượt cho đẹp */
        }
    </style>

    <script type="text/javascript">
        var arrImages = [
            "image1.jpg", 
            "image2.jpg", 
            "image3.jpg",
            "image4.jpg"
        ];
        
        var index = 0; 

        function nextImage() {
            index++;
            if (index >= arrImages.length) {
                index = 0; 
            }
            document.myimage.src = arrImages[index];
        }

        // --- ĐOẠN QUAN TRỌNG NHẤT ---
        // Thiết lập thời gian tự động gọi hàm nextImage mỗi 3000ms (3 giây)
        setTimeout(nextImage, 3000);
    </script>
</head>

<body>
    <div class="gallery">
        <img name="myimage" src="image1.jpg" alt="Slideshow" />
        
        </div>
</body>
</html>
